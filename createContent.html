<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=Manrope:wght@500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-highest": "#1c1c1c",
                        "secondary": "#9f9da1",
                        "surface-container": "#141414",
                        "on-error-container": "#ff97a3",
                        "tertiary": "#dee5ff",
                        "primary": "#bdc2ff",
                        "on-primary-fixed-variant": "#4650b9",
                        "on-secondary-container": "#c1bec3",
                        "on-primary-container": "#c9cdff",
                        "error-container": "#7f2737",
                        "secondary-dim": "#9f9da1",
                        "on-tertiary-fixed-variant": "#4b546d",
                        "on-surface-variant": "#8e8d8c",
                        "on-tertiary-fixed": "#2f384f",
                        "inverse-surface": "#fcf9f8",
                        "on-tertiary": "#4a536c",
                        "tertiary-container": "#ced6f5",
                        "inverse-primary": "#4954bc",
                        "secondary-container": "#3c3b3f",
                        "on-error": "#490013",
                        "on-surface": "#e7e5e5",
                        "on-background": "#e7e5e5",
                        "surface-bright": "#222222",
                        "primary-container": "#2f3aa3",
                        "secondary-fixed": "#e5e1e6",
                        "inverse-on-surface": "#565555",
                        "secondary-fixed-dim": "#d6d3d8",
                        "outline-variant": "#333333",
                        "tertiary-dim": "#c0c9e6",
                        "surface-tint": "#bdc2ff",
                        "surface-variant": "#1c1c1c",
                        "on-tertiary-container": "#424a63",
                        "error-dim": "#b95463",
                        "on-primary": "#28329c",
                        "on-primary-fixed": "#27319b",
                        "surface": "#0a0a0a",
                        "tertiary-fixed": "#ced6f5",
                        "tertiary-fixed-dim": "#c0c9e6",
                        "surface-container-low": "#0f0f0f",
                        "background": "#0a0a0a",
                        "primary-fixed": "#e0e0ff",
                        "error": "#ec7c8a",
                        "on-secondary-fixed-variant": "#5c5b5f",
                        "primary-dim": "#acb3ff",
                        "surface-container-lowest": "#050505",
                        "on-secondary": "#202023",
                        "outline": "#444444",
                        "primary-fixed-dim": "#ced1ff",
                        "surface-dim": "#0a0a0a",
                        "on-secondary-fixed": "#403f43",
                        "surface-container-high": "#181818"
                    },
                    fontFamily: {
                        "headline": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Manrope", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"]
                    },
                    borderRadius: { "DEFAULT": "0.15rem", "lg": "0.25rem", "xl": "0.5rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            background-color: #0a0a0a;
            color: #e7e5e5;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 20;
            vertical-align: middle;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 2px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #222;
        }

        ::placeholder {
            color: #444 !important;
            opacity: 1;
        }

        input:focus,
        textarea:focus {
            outline: none;
            box-shadow: none !important;
        }
    </style>
</head>

<body class="selection:bg-primary/20 selection:text-primary">
    <!-- Main Content Canvas -->
    <main class="min-h-screen flex flex-col items-center">
        <div class="max-w-5xl w-full px-8 py-24 md:py-32">
            <!-- Page Header: Re-styled for Minimalist Direction -->
            <header class="mb-20 text-center">
                <h1 class="text-3xl font-normal font-headline tracking-tight text-on-surface mb-4">Create Content Item
                </h1>
                <p
                    class="text-on-surface-variant text-sm font-label max-w-lg mx-auto opacity-60 leading-relaxed uppercase tracking-[0.2em]">
                    Add notes, diagrams, and references for a new lookup entry</p>
            </header>
            <!-- Main Form Grid: Clean Two-Column Layout -->
            <div class="grid grid-cols-1 md:grid-cols-12 gap-16">
                <!-- Left Column (Primary Content) -->
                <div class="md:col-span-8 flex flex-col gap-16">
                    <!-- Command-line style Basic Info -->
                    <section class="flex flex-col gap-8">
                        <div class="space-y-6">
                            <div class="relative group">
                                <span
                                    class="absolute -left-6 top-1/2 -translate-y-1/2 text-primary opacity-40 font-mono text-sm tracking-tighter">_</span>
                                <input
                                    class="w-full bg-transparent border-b border-outline-variant/50 focus:border-primary/50 transition-colors text-xl font-headline py-3 px-0 placeholder:text-outline"
                                    placeholder="Item Name" type="text" />
                            </div>
                            <div class="flex gap-12 items-end">
                                <div class="flex-1 relative">
                                    <label
                                        class="block font-label text-[10px] font-bold uppercase tracking-[0.2em] text-on-surface-variant mb-2 opacity-50">Group</label>
                                    <input
                                        class="w-full bg-transparent border-b border-outline-variant/30 focus:border-primary/50 transition-colors text-sm py-2 px-0"
                                        placeholder="Engineering" type="text" />
                                </div>
                                <div class="flex-[1.5] relative">
                                    <label
                                        class="block font-label text-[10px] font-bold uppercase tracking-[0.2em] text-on-surface-variant mb-2 opacity-50">Tags</label>
                                    <div
                                        class="flex flex-wrap gap-3 items-center border-b border-outline-variant/30 py-2">
                                        <span
                                            class="text-xs font-medium text-primary flex items-center gap-1.5 bg-primary/5 px-2 py-0.5 rounded">
                                            Systems <button
                                                class="material-symbols-outlined text-[14px] hover:text-on-surface">close</button>
                                        </span>
                                        <span
                                            class="text-xs font-medium text-primary flex items-center gap-1.5 bg-primary/5 px-2 py-0.5 rounded">
                                            Network <button
                                                class="material-symbols-outlined text-[14px] hover:text-on-surface">close</button>
                                        </span>
                                        <input
                                            class="flex-1 bg-transparent border-none focus:ring-0 text-sm py-0 min-w-[80px]"
                                            placeholder="+" type="text" />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>
                    <!-- Focused Editor Section -->
                    <section class="flex flex-col min-h-[500px]">
                        <div
                            class="flex justify-between items-center mb-6 opacity-40 hover:opacity-100 transition-opacity">
                            <label
                                class="block font-label text-[10px] font-bold uppercase tracking-[0.2em] text-on-surface-variant">Editor</label>
                            <div class="flex gap-6 text-on-surface-variant">
                                <button class="hover:text-primary transition-colors"><span
                                        class="material-symbols-outlined text-[18px]">format_bold</span></button>
                                <button class="hover:text-primary transition-colors"><span
                                        class="material-symbols-outlined text-[18px]">format_italic</span></button>
                                <button class="hover:text-primary transition-colors"><span
                                        class="material-symbols-outlined text-[18px]">code</span></button>
                                <div class="w-[1px] h-3 bg-outline-variant/30 self-center"></div>
                                <button class="hover:text-primary transition-colors"><span
                                        class="material-symbols-outlined text-[18px]">visibility</span></button>
                            </div>
                        </div>
                        <textarea
                            class="flex-1 bg-transparent border-none focus:ring-0 text-on-surface placeholder:text-outline/40 transition-all py-0 px-0 resize-none custom-scrollbar leading-relaxed font-body text-base"
                            placeholder="Start writing..."></textarea>
                    </section>
                </div>
                <!-- Right Column (Supporting Assets) -->
                <div class="md:col-span-4 flex flex-col gap-12">
                    <!-- Media Assets: Simplified -->
                    <section>
                        <h3
                            class="font-label text-[10px] font-bold uppercase tracking-[0.2em] text-on-surface-variant mb-6 opacity-50">
                            Media</h3>
                        <div class="grid grid-cols-2 gap-4">
                            <div
                                class="group relative aspect-square bg-surface-container-high border border-outline-variant/20 overflow-hidden cursor-pointer">
                                <img class="w-full h-full object-cover grayscale opacity-40 group-hover:opacity-100 group-hover:grayscale-0 transition-all duration-500"
                                    data-alt="Abstract gradient diagram placeholder"
                                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuC1dNHDiodWhdX9lQ8plHZfZRQ4ZwyywWfKzoomiYWWcCJ7kTh2YVw8YORpU1dGJdHY8j0pAg3LAZsTenzMRrUWRYnJu3Sq3fVVAxjz_NwIXOZQHU0CjZm_oKiA5kykBFRymwpR5mhjzrp4X9RV0-Qb6zhJOfpFj3v8Wo5pGCvTwRYOK6U4VHK2bPknpROxR7gdPoebx5JzvO-l4sQcNAq0Z3WbC68zO91vLduUAEo8KHEv3OA_21sVuF0wjS6tEmAKt4SfL7YKvWwd" />
                                <div
                                    class="absolute inset-0 bg-surface/80 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-4">
                                    <button class="text-on-surface hover:text-primary transition-colors"><span
                                            class="material-symbols-outlined text-[18px]">content_copy</span></button>
                                    <button class="text-on-surface hover:text-error transition-colors"><span
                                            class="material-symbols-outlined text-[18px]">delete</span></button>
                                </div>
                            </div>
                            <div
                                class="group relative aspect-square bg-surface-container-high border border-outline-variant/20 overflow-hidden cursor-pointer">
                                <img class="w-full h-full object-cover grayscale opacity-40 group-hover:opacity-100 group-hover:grayscale-0 transition-all duration-500"
                                    data-alt="Technical chart graphic placeholder"
                                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuAko-NYLy6ywU4ltllyBIelqfTcFWDwbyVciTbcyyJQOakKMppj8YFJt5FrUviEj3C65u2YXxaUe3ehLfjhMDo_6495euGfCm1sJVcEB4DBrWpGHz7k7G4LHEkstXzyD1R8MXcoqav3Js4YkrpRVHxE8jK7kwu3p2_quPzdfL9HpoRXxMMYrdz8DTr7wn2A3Re5fZZPZqxdMpuvVZVGB7skj0om8hDkU0TAlrUmAv-d4KJbBo0T7tkhdvIi9z9qQup56PvSpRR1Cn0x" />
                                <div
                                    class="absolute inset-0 bg-surface/80 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-4">
                                    <button class="text-on-surface hover:text-primary transition-colors"><span
                                            class="material-symbols-outlined text-[18px]">content_copy</span></button>
                                    <button class="text-on-surface hover:text-error transition-colors"><span
                                            class="material-symbols-outlined text-[18px]">delete</span></button>
                                </div>
                            </div>
                            <div
                                class="col-span-2 border border-dashed border-outline-variant/30 h-24 flex flex-col items-center justify-center group hover:border-primary/30 cursor-pointer transition-colors">
                                <span
                                    class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors">add</span>
                                <span class="text-[10px] uppercase tracking-[0.1em] text-outline-variant mt-1">Upload
                                    Asset</span>
                            </div>
                        </div>
                    </section>
                    <!-- Files: Minimalist List -->
                    <section>
                        <h3
                            class="font-label text-[10px] font-bold uppercase tracking-[0.2em] text-on-surface-variant mb-6 opacity-50">
                            References</h3>
                        <div class="flex flex-col gap-4">
                            <div class="flex items-center gap-4 group cursor-pointer">
                                <div
                                    class="w-8 h-8 flex items-center justify-center bg-surface-container-highest/50 border border-outline-variant/20 text-on-surface-variant group-hover:text-primary transition-colors">
                                    <span class="material-symbols-outlined text-[18px]">description</span>
                                </div>
                                <div class="flex-1 min-w-0">
                                    <p
                                        class="text-xs font-medium text-on-surface-variant group-hover:text-on-surface truncate transition-colors">
                                        arch_spec_v2.pdf</p>
                                </div>
                            </div>
                            <div class="flex items-center gap-4 group cursor-pointer">
                                <div
                                    class="w-8 h-8 flex items-center justify-center bg-surface-container-highest/50 border border-outline-variant/20 text-on-surface-variant group-hover:text-primary transition-colors">
                                    <span class="material-symbols-outlined text-[18px]">play_circle</span>
                                </div>
                                <div class="flex-1 min-w-0">
                                    <p
                                        class="text-xs font-medium text-on-surface-variant group-hover:text-on-surface truncate transition-colors">
                                        Visualizing Paxos</p>
                                </div>
                            </div>
                            <button
                                class="mt-4 flex items-center gap-2 text-[10px] font-bold uppercase tracking-[0.2em] text-outline-variant hover:text-primary transition-colors">
                                <span class="material-symbols-outlined text-[16px]">add</span> Add Link/File
                            </button>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </main>
    <!-- Focused Bottom Actions -->
    <footer class="fixed bottom-0 left-0 right-0 h-24 flex items-center justify-center z-50">
        <div class="max-w-5xl w-full px-8 flex items-center justify-between">
            <div
                class="flex items-center gap-4 text-on-surface-variant opacity-40 hover:opacity-100 transition-opacity">
                <span class="font-mono text-[10px] tracking-widest uppercase">ID: SA-7742-C</span>
                <div class="w-[1px] h-3 bg-outline-variant"></div>
                <button
                    class="text-[10px] font-bold uppercase tracking-widest hover:text-error transition-colors">Discard</button>
            </div>
            <button class="group flex items-center gap-3">
                <span
                    class="text-[10px] font-bold uppercase tracking-[0.3em] text-on-surface-variant group-hover:text-primary transition-all">Save
                    Changes</span>
                <div
                    class="w-8 h-8 rounded-full border border-outline-variant group-hover:border-primary/50 group-hover:bg-primary group-hover:text-on-primary flex items-center justify-center transition-all duration-300">
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
                </div>
            </button>
        </div>
    </footer>
</body>

</html>
